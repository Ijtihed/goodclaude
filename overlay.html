<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  html, body { overflow: hidden; background: transparent; width: 100%; height: 100%; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── Load & process pat hand (remove black background) ────────────────────
const patHandImg = new Image();
patHandImg.src = 'assets/pat-hand.png';
let processedHand = null;

patHandImg.onload = () => {
  const off = document.createElement('canvas');
  off.width = patHandImg.width;
  off.height = patHandImg.height;
  const oc = off.getContext('2d');
  oc.drawImage(patHandImg, 0, 0);
  const id = oc.getImageData(0, 0, off.width, off.height);
  const px = id.data;
  for (let i = 0; i < px.length; i += 4) {
    const brightness = (px[i] + px[i + 1] + px[i + 2]) / 3;
    if (brightness < 35) {
      px[i + 3] = 0;
    } else if (brightness < 70) {
      px[i + 3] = Math.floor(((brightness - 35) / 35) * px[i + 3]);
    }
  }
  oc.putImageData(id, 0, 0);

  processedHand = off;
};

// ── State ────────────────────────────────────────────────────────────────
let mouseX = 0, mouseY = 0;
let treat = null;
let dropping = false;
let dropX = 0, dropY = 0, dropTime = 0;
let hideTimer = null;
let treatBob = 0;
let treatScale = 0;

let patting = false;
let patPhase = 0;
let patCycleCount = 0;
const MAX_PATS = 4;
const PAT_CYCLE_SPEED = 0.14;

const BG_ALPHA = 0.011;

const CHIME_SOUNDS = [
  'sounds/chime1.mp3', 'sounds/chime2.mp3',
  'sounds/chime3.mp3', 'sounds/chime4.mp3',
];

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

document.addEventListener('mousedown', () => {
  if (treat && !dropping) triggerDrop();
});

// ── Drop logic ───────────────────────────────────────────────────────────
function triggerDrop() {
  dropping = true;
  dropX = mouseX;
  dropY = mouseY;
  dropTime = Date.now();
  patting = true;
  patPhase = 0;
  patCycleCount = 0;

  playChime();
  window.bridge.rewardDrop();

  hideTimer = setTimeout(() => {
    treat = null;
    dropping = false;
    patting = false;
    document.body.style.cursor = 'default';
    window.bridge.hideOverlay();
  }, 2200);
}

function playChime() {
  const src = CHIME_SOUNDS[Math.floor(Math.random() * CHIME_SOUNDS.length)];
  const a = new Audio(src);
  a.volume = 0.65;
  a.play().catch(() => {});
}

function playGrumpy() {
  const a = new Audio('sounds/grumpy.mp3');
  a.volume = 0.7;
  a.play().catch(() => {});
}

// ── Draw hand ────────────────────────────────────────────────────────────
function drawPatHand(x, y, scale, patOffset, rotation, alpha) {
  if (!processedHand) return;
  ctx.save();

  const targetH = 80;
  const ratio = targetH / processedHand.height;
  const w = processedHand.width * ratio * scale;
  const h = targetH * scale;

  ctx.globalAlpha = alpha;
  ctx.translate(x, y + patOffset);
  ctx.rotate(rotation);
  ctx.drawImage(processedHand, -w * 0.35, -h * 0.85, w, h);

  ctx.restore();
}

// ── Update ───────────────────────────────────────────────────────────────
function update() {
  if (treat && !dropping) {
    treatBob += 0.06;
    treatScale = Math.min(1, treatScale + 0.08);
  }

  if (patting) {
    patPhase += PAT_CYCLE_SPEED;
    if (patPhase >= Math.PI * 2) {
      patPhase -= Math.PI * 2;
      patCycleCount++;
      if (patCycleCount >= MAX_PATS) {
        patting = false;
      }
    }
  }
}

// ── Draw ─────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = `rgba(0,0,0,${BG_ALPHA})`;
  ctx.fillRect(0, 0, W, H);

  if (treat && !dropping) {
    const t = treatBob;
    const bobY = Math.sin(t) * 4;
    const rock = Math.sin(t * 0.8) * 0.12;
    const sway = Math.sin(t * 0.6) * 3;
    drawPatHand(mouseX + sway, mouseY + bobY, treatScale, 0, rock, 1);
  }

  if (patting && dropping) {
    const patOffset = Math.sin(patPhase) * 16;
    const rock = Math.sin(patPhase * 2) * 0.08;
    const elapsed = Date.now() - dropTime;
    const alpha = Math.max(0, 1 - elapsed / 2000);
    drawPatHand(dropX, dropY, 1, patOffset, rock, alpha);
  }
}

// ── Main loop ────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ── IPC ──────────────────────────────────────────────────────────────────
window.bridge.onSpawnTreat(() => {
  treat = { active: true };
  dropping = false;
  patting = false;
  treatBob = 0;
  treatScale = 0;
  if (processedHand) document.body.style.cursor = 'none';
  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
});

window.bridge.onDismissTreat(() => {
  treat = null;
  dropping = false;
  patting = false;
  document.body.style.cursor = 'default';
  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
  window.bridge.hideOverlay();
});

window.bridge.onEscapeCancel(() => {
  playGrumpy();
  treat = null;
  dropping = false;
  patting = false;
  document.body.style.cursor = 'default';
  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
  setTimeout(() => window.bridge.hideOverlay(), 300);
});

window.bridge.onQuickReward(() => {
  treat = { active: true };
  dropping = false;
  patting = false;
  treatBob = 0;
  treatScale = 0;
  if (processedHand) document.body.style.cursor = 'none';
  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
});

</script>
</body>
</html>
