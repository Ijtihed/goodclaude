<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>goodclaude</title>
  <meta name="description" content="Headpats for Claude Code."/>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <meta property="og:title" content="goodclaude"/>
  <meta property="og:description" content="Headpats for Claude Code."/>
  <meta property="og:image" content="og.png"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      color: #2a2a2a;
      background: #f7f6f3;
      -webkit-font-smoothing: antialiased;
      padding: 2rem 1.25rem 3rem;
    }
    main {
      max-width: 32rem;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .sub {
      margin: 0 0 2rem;
      color: #666;
      font-size: 0.95rem;
    }
    p.label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #888;
      margin: 0 0 0.5rem;
    }
    .row {
      display: flex;
      align-items: stretch;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    code.block {
      flex: 1;
      display: block;
      padding: 0.65rem 0.85rem;
      background: #fff;
      border: 1px solid #e5e3de;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.85rem;
      color: #333;
      overflow-x: auto;
    }
    button.copy {
      flex-shrink: 0;
      padding: 0 0.9rem;
      font: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      background: #fff;
      border: 1px solid #e5e3de;
      border-radius: 8px;
      color: #444;
    }
    button.copy:hover { background: #fafaf8; }
    button.copy:active { background: #f0efeb; }
    .links {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e8e6e1;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
    }
    .links a {
      color: #1a6b8a;
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
    .note {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #777;
    }
    .note code {
      font-size: 0.9em;
      background: #eee9e2;
      padding: 0.1em 0.35em;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>goodclaude 🐱</h1>
    <p class="sub">Headpats for Claude Code. Install, run, paste nice things into your terminal.</p>

    <p class="label">Install</p>
    <div class="row">
      <code class="block" id="c1">npm install -g goodclaude</code>
      <button type="button" class="copy" data-target="c1" aria-label="Copy install command">Copy</button>
    </div>
    <div class="row">
      <code class="block" id="c2">goodclaude</code>
      <button type="button" class="copy" data-target="c2" aria-label="Copy run command">Copy</button>
    </div>

    <p class="note">Config: <code>~/.goodclauderc</code> for hotkeys and messages.</p>

    <nav class="links" aria-label="Links">
      <a href="https://github.com/Ijtihed/goodclaude" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="https://www.npmjs.com/package/goodclaude" target="_blank" rel="noopener noreferrer">npm</a>
    </nav>
  </main>
  <script>
    document.querySelectorAll('button.copy').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var id = btn.getAttribute('data-target');
        var el = id && document.getElementById(id);
        var text = el ? el.textContent.trim() : '';
        if (!text || !navigator.clipboard || !navigator.clipboard.writeText) return;
        var label = btn.textContent;
        navigator.clipboard.writeText(text).then(function () {
          btn.textContent = 'Copied';
          setTimeout(function () { btn.textContent = label; }, 1500);
        });
      });
    });
  </script>
</body>
</html>
